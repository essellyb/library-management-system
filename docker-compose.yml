services:
  postgres:
    image: postgres:16
    container_name: library-v2-db
    environment:
      POSTGRES_DB: library
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - bookvault_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  bookvault_data: